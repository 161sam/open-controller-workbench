variant:
  id: "fader_strip_45mm"
  name: "Fader Strip 45 mm"
  description: "Compact strip variant using a 45 mm linear fader"
  template_id: "fader_strip"
  category: "module"
  tags:
    - "fader"
    - "45mm"
    - "strip"
  version: "1.0"

overrides:
  parameters:
    fader_length: 45
    case_width: 78.0
    case_depth: 128.0
  controller:
    surface:
      height: 124
  zones:
    - id: "fader_lane"
      type: "column"
      x: 15
      y: 10
      width: 50
      height: 68
      strategy: "column"
    - id: "button_row"
      type: "row"
      x: 10
      y: 88
      width: 60
      height: 25
      strategy: "row"
  components:
    replace:
      - match_id: "fader1"
        with:
          id: "fader1"
          type: "fader"
          library_ref: "generic_45mm_linear_fader"
          zone: "fader_lane"
  layout:
    config:
      spacing_mm: 20
  defaults:
    handedness: "center"
