variant:
  id: "fader_strip_60mm"
  name: "Fader Strip 60 mm"
  description: "Long-throw strip variant using a 60 mm linear fader"
  template_id: "fader_strip"
  category: "module"
  tags:
    - "fader"
    - "60mm"
    - "strip"
  version: "1.0"

overrides:
  controller:
    surface:
      width: 90
      height: 150
  zones:
    - id: "fader_lane"
      type: "column"
      x: 18
      y: 10
      width: 54
      height: 88
      strategy: "column"
    - id: "button_row"
      type: "row"
      x: 12
      y: 108
      width: 66
      height: 25
      strategy: "row"
  components:
    replace:
      - match_id: "fader1"
        with:
          id: "fader1"
          type: "fader"
          library_ref: "generic_60mm_linear_fader"
          zone: "fader_lane"
  layout:
    config:
      spacing_mm: 26
  defaults:
    handedness: "center"
