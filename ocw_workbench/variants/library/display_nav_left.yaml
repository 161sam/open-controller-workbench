variant:
  id: "display_nav_left"
  name: "Display Navigation Left"
  description: "Navigation module with display emphasis on the left side"
  template_id: "display_nav_module"
  category: "module"
  tags:
    - "display"
    - "navigation"
    - "left"
  version: "1.0"

overrides:
  controller:
    surface:
      width: 200
  zones:
    - id: "display_zone"
      type: "grid"
      x: 12
      y: 10
      width: 58
      height: 30
      strategy: "grid"
    - id: "nav_zone"
      type: "row"
      x: 86
      y: 45
      width: 102
      height: 30
      strategy: "row"
  layout:
    config:
      nav_alignment: "left"
      spacing_x_mm: 22
  defaults:
    handedness: "left"
