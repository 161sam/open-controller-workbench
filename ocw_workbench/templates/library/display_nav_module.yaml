template:
  id: "display_nav_module"
  name: "Display Navigation Module"
  description: "Status display with two encoders and two buttons"
  category: "module"
  tags:
    - "display"
    - "navigation"
  version: "1.0"
controller:
  surface:
    type: "rounded_rect"
    width: 160
    height: 90
    corner_radius: 8
  height: 30
  top_thickness: 3
  wall_thickness: 3
  bottom_thickness: 3
  lid_inset: 1.5
  inner_clearance: 0.35
zones:
  - id: "display_zone"
    type: "grid"
    x: 45
    y: 10
    width: 70
    height: 30
    strategy: "grid"
  - id: "nav_zone"
    type: "grid"
    x: 15
    y: 45
    width: 130
    height: 30
    strategy: "grid"
components:
  - id: "oled_status"
    type: "display"
    library_ref: "adafruit_oled_096_i2c_ssd1306"
    zone: "display_zone"
  - id: "enc_left"
    type: "encoder"
    library_ref: "generic_ec11_encoder_with_push"
    zone: "nav_zone"
  - id: "enc_right"
    type: "encoder"
    library_ref: "generic_ec11_encoder_with_push"
    zone: "nav_zone"
  - id: "btn_back"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "nav_zone"
  - id: "btn_enter"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "nav_zone"
layout:
  strategy: "zone"
  config:
    grid_mm: 1
    padding_mm: 10
    spacing_x_mm: 32
    spacing_y_mm: 24
parameters:
  - id: "display_size_inch"
    label: "Display Size"
    type: "enum"
    default: "0.96"
    control: "select"
    options:
      - value: "0.96"
        label: "0.96 inch"
      - value: "1.3"
        label: "1.3 inch"
    help: "Select the display breakout size used for the status screen."
  - id: "knob_diameter"
    label: "Knob Diameter"
    type: "enum"
    default: 18
    control: "button_group"
    options:
      - value: 18
        label: "18 mm"
      - value: 24
        label: "24 mm"
    unit: "mm"
    help: "Select the encoder knob clearance profile."
parameter_presets:
  - id: "compact_encoder_strip"
    name: "Compact Encoder Strip"
    values:
      display_size_inch: "0.96"
      knob_diameter: 18
  - id: "wide_large_display"
    name: "Wide Large Display"
    values:
      display_size_inch: "1.3"
      knob_diameter: 24
parameter_bindings:
  values:
    - target: "components[oled_status].library_ref"
      parameter: "display_size_inch"
      value_map:
        "0.96": "adafruit_oled_096_i2c_ssd1306"
        "1.3": "adafruit_oled_130_i2c_ssd1306"
    - target: "components[enc_left].library_ref"
      parameter: "knob_diameter"
      value_map:
        "18": "generic_ec11_encoder_with_push"
        "24": "generic_ec11_encoder_with_push_large_knob"
    - target: "components[enc_right].library_ref"
      parameter: "knob_diameter"
      value_map:
        "18": "generic_ec11_encoder_with_push"
        "24": "generic_ec11_encoder_with_push_large_knob"
constraints:
  profile: "default"
defaults:
  io_strategy: "direct_gpio"
  component_defaults:
    by_zone:
      display_zone:
        tags:
          - "status"
          - "template"
      nav_zone:
        tags:
          - "navigation"
          - "template"
