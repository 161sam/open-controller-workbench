template:
  id: "encoder_module"
  name: "4 Encoder Module"
  description: "Basic encoder control module"
  category: "module"
  tags:
    - "encoder"
    - "controls"
  version: "1.0"
controller:
  surface:
    type: "rounded_rect"
    width: 120
    height: 60
    corner_radius: 8
  height: 30
  top_thickness: 3
  wall_thickness: 3
  bottom_thickness: 3
  lid_inset: 1.5
  inner_clearance: 0.35
zones:
  - id: "main_controls"
    type: "grid"
    x: 10
    y: 10
    width: 100
    height: 40
    strategy: "grid"
components:
  - id: "enc1"
    type: "encoder"
    library_ref: "alps_ec11e15204a3"
    zone: "main_controls"
  - id: "enc2"
    type: "encoder"
    library_ref: "alps_ec11e15204a3"
    zone: "main_controls"
  - id: "enc3"
    type: "encoder"
    library_ref: "alps_ec11e15204a3"
    zone: "main_controls"
  - id: "enc4"
    type: "encoder"
    library_ref: "alps_ec11e15204a3"
    zone: "main_controls"
layout:
  strategy: "grid"
  config:
    grid_mm: 1
    padding_mm: 10
    rows: 1
    cols: 4
    spacing_x_mm: 25
    spacing_y_mm: 20
constraints:
  profile: "default"
defaults:
  io_strategy: "direct_gpio"
  component_defaults:
    by_type:
      encoder:
        tags:
          - "encoder-bank"
