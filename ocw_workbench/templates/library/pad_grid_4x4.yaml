template:
  id: "pad_grid_4x4"
  name: "4x4 Pad Grid"
  description: "Sixteen performance pads in a 4x4 matrix"
  category: "module"
  tags:
    - "pad"
    - "grid"
    - "performance"
  version: "1.0"
controller:
  surface:
    type: "rounded_rect"
    width: 180
    height: 180
    corner_radius: 10
  height: 32
  top_thickness: 3
zones:
  - id: "pad_matrix"
    type: "grid"
    x: 15
    y: 15
    width: 150
    height: 150
    strategy: "grid"
components:
  - id: "pad1"
    type: "pad"
    library_ref: "generic_mpc_pad_30mm"
    zone: "pad_matrix"
