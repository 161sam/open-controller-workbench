template:
  id: "fader_strip"
  name: "Fader Strip"
  description: "Single fader with three utility buttons"
  category: "module"
  tags:
    - "fader"
    - "strip"
  version: "1.0"
controller:
  width: "${parameters.case_width}"
  depth: "${parameters.case_depth}"
  surface:
    type: "rounded_rect"
    width: "${parameters.case_width}"
    height: "${parameters.case_depth}"
    corner_radius: 8
  height: 30
  top_thickness: 3
  wall_thickness: 3
  bottom_thickness: 3
  lid_inset: 1.5
  inner_clearance: 0.35
zones:
  - id: "fader_lane"
    type: "column"
    x: 15
    y: 10
    width: 50
    height: 80
    strategy: "column"
  - id: "button_row"
    type: "row"
    x: 10
    y: 100
    width: 60
    height: 25
    strategy: "row"
components:
  - id: "fader1"
    type: "fader"
    library_ref: "generic_60mm_linear_fader"
    zone: "fader_lane"
  - id: "solo"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "button_row"
  - id: "mute"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "button_row"
  - id: "select"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "button_row"
layout:
  strategy: "zone"
  config:
    grid_mm: 1
    padding_mm: 10
    spacing_mm: 24
parameters:
  - id: "fader_length"
    label: "Fader Length"
    type: "enum"
    default: 60
    control: "button_group"
    options:
      - value: 45
        label: "45 mm"
      - value: 60
        label: "60 mm"
    help: "Select the fader travel and matching component footprint."
  - id: "case_width"
    label: "Case Width"
    type: "float"
    default: 80.0
    min: 70.0
    max: 120.0
    step: 5.0
    unit: "mm"
  - id: "case_depth"
    label: "Case Depth"
    type: "float"
    default: 140.0
    min: 110.0
    max: 180.0
    step: 5.0
    unit: "mm"
parameter_presets:
  - id: "long_fader"
    name: "Long Fader"
    values:
      fader_length: 60
      case_width: 80.0
      case_depth: 140.0
  - id: "compact_fader"
    name: "Compact Fader"
    values:
      fader_length: 45
      case_width: 78.0
      case_depth: 128.0
parameter_bindings:
  values:
    - target: "components[fader1].library_ref"
      parameter: "fader_length"
      value_map:
        "45": "generic_45mm_linear_fader"
        "60": "generic_60mm_linear_fader"
constraints:
  profile: "default"
defaults:
  io_strategy: "direct_gpio"
  component_defaults:
    by_zone:
      button_row:
        tags:
          - "utility"
      fader_lane:
        tags:
          - "mix"
