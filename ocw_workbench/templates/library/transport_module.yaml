template:
  id: "transport_module"
  name: "Transport Module"
  description: "Six-button transport control strip"
  category: "module"
  tags:
    - "transport"
    - "button"
  version: "1.0"
controller:
  surface:
    type: "rounded_rect"
    width: 150
    height: 50
    corner_radius: 8
  height: 28
  top_thickness: 3
  wall_thickness: 3
  bottom_thickness: 3
  lid_inset: 1.5
  inner_clearance: 0.35
zones:
  - id: "transport_buttons"
    type: "row"
    x: 10
    y: 10
    width: 130
    height: 30
    strategy: "row"
components:
  - id: "play"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "transport_buttons"
  - id: "stop"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "transport_buttons"
  - id: "rec"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "transport_buttons"
  - id: "loop"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "transport_buttons"
  - id: "rew"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "transport_buttons"
  - id: "ff"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "transport_buttons"
layout:
  strategy: "row"
  config:
    grid_mm: 1
    padding_mm: 10
    spacing_mm: 22
constraints:
  profile: "default"
defaults:
  io_strategy: "direct_gpio"
  component_defaults:
    by_zone:
      transport_buttons:
        tags:
          - "transport"
