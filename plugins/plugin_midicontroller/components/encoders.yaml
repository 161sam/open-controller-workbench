components:
  - id: "alps_ec11e15204a3"
    category: "encoder"
    manufacturer: "Alps Alpine"
    part_number: "EC11E15204A3"
    description: "11 mm rotary encoder for macro, synth, and parameter control when you do not need an integrated push action"
    tags:
      - "encoder"
      - "incremental"
      - "vertical"
      - "11mm"
      - "alps"
    ui:
      label: "Rotary Encoder 11 mm"
      icon: "encoder.svg"
      category: "Rotary Controls"
      tags:
        - "knob"
        - "rotate"
      command:
        placeable: true
        toolbar: true
        order: 30
        category: "Rotary Controls"
        label: "Place Rotary Encoder"
        tooltip: "Place a dedicated rotary encoder for synth macros, sends, or parameter control. Click in the 3D view to position it."
        command_id: "OCW_PlaceRotaryEncoder"
    mechanical:
      body_size_mm:
        width: 11.0
        depth: 11.0
        height: 13.5
      shaft:
        shape: "flat"
        length_mm: 20.0
        diameter_mm: 6.0
      panel:
        recommended_hole_diameter_mm: 7.0
        recommended_hole_diameter_with_tolerance_mm: 7.2
        recommended_keepout_top_diameter_mm: 20.0
        recommended_keepout_bottom_diameter_mm: 24.0
        recommended_keepout_bottom_depth_mm: 18.0
      mounting:
        method: "threaded_bushing"
        thread_diameter_mm: 7.0
        nut_outer_diameter_mm: 11.8
        washer_outer_diameter_mm: 13.0
      orientation: "vertical"
    electrical:
      type: "incremental_encoder"
      output: "quadrature_ab"
      supply_required: false
      rated_voltage: "5V DC"
      rated_current: "10mA"
      operating_temperature_c:
        min: -40
        max: 85
      durability_cycles: 15000
      pins:
        - "A"
        - "B"
        - "C"
    pcb:
      default_footprint: "RotaryEncoder_Alps_EC11E_Vertical"
      placement_side: "top"
      anchor: "shaft_center"
      tht: true
      estimated_height_above_pcb_mm: 13.5
      estimated_height_below_pcb_mm: 5.0
      notes:
        - "Footprint name is a project-local default and may need mapping to your KiCad library."
    ocf:
      control_type: "encoder"
      supports:
        - "rotate"
      default_logical_role: "generic_encoder"

  - id: "generic_ec11_encoder_with_push"
    category: "encoder"
    manufacturer: "Generic"
    part_number: "EC11-PUSH"
    description: "11 mm push encoder for browse, confirm, and parameter workflows that need rotate plus press"
    tags:
      - "encoder"
      - "incremental"
      - "push"
      - "ec11"
    ui:
      label: "Push Encoder 11 mm"
      icon: "encoder.svg"
      category: "Rotary Controls"
      tags:
        - "knob"
        - "press"
      command:
        placeable: true
        toolbar: true
        order: 35
        category: "Rotary Controls"
        label: "Place Push Encoder"
        tooltip: "Place a push encoder for browsing, parameter control, or menu confirmation. Click in the 3D view to position it."
        command_id: "OCW_PlaceEncoder"
    mechanical:
      body_size_mm:
        width: 12.0
        depth: 12.0
        height: 14.0
      shaft:
        shape: "round"
        length_mm: 18.0
        diameter_mm: 6.0
      panel:
        recommended_hole_diameter_mm: 7.0
        recommended_hole_diameter_with_tolerance_mm: 7.2
        recommended_keepout_top_diameter_mm: 20.0
        recommended_keepout_bottom_diameter_mm: 25.0
        recommended_keepout_bottom_depth_mm: 20.0
      mounting:
        method: "threaded_bushing"
        thread_diameter_mm: 7.0
      orientation: "vertical"
    electrical:
      type: "incremental_encoder"
      output: "quadrature_ab"
      integrated_switch: true
      switch_type: "momentary_switch"
      supply_required: false
      pins:
        - "A"
        - "B"
        - "C"
        - "SW1"
        - "SW2"
    pcb:
      default_footprint: "RotaryEncoder_Alps_EC11E_Switch_Vertical"
      placement_side: "top"
      anchor: "shaft_center"
      tht: true
      estimated_height_above_pcb_mm: 14.0
      estimated_height_below_pcb_mm: 6.0
      notes:
        - "Footprint name is a project-local default and may need mapping to your KiCad library."
    ocf:
      control_type: "encoder"
      supports:
        - "rotate"
        - "press"
      default_logical_role: "push_encoder"

  - id: "generic_ec11_encoder_with_push_large_knob"
    category: "encoder"
    manufacturer: "Generic"
    part_number: "EC11-PUSH-LARGE-KNOB"
    description: "11 mm push encoder with larger knob clearance for more comfortable live performance gestures"
    tags:
      - "encoder"
      - "incremental"
      - "push"
      - "ec11"
      - "large_knob"
    ui:
      label: "Push Encoder Large Knob"
      icon: "encoder.svg"
      category: "Rotary Controls"
      tags:
        - "knob"
        - "press"
        - "large"
      command:
        placeable: false
    mechanical:
      body_size_mm:
        width: 12.0
        depth: 12.0
        height: 14.0
      shaft:
        shape: "round"
        length_mm: 18.0
        diameter_mm: 6.0
      panel:
        recommended_hole_diameter_mm: 7.0
        recommended_hole_diameter_with_tolerance_mm: 7.2
        recommended_keepout_top_diameter_mm: 26.0
        recommended_keepout_bottom_diameter_mm: 25.0
        recommended_keepout_bottom_depth_mm: 20.0
      mounting:
        method: "threaded_bushing"
        thread_diameter_mm: 7.0
      orientation: "vertical"
    electrical:
      type: "incremental_encoder"
      output: "quadrature_ab"
      integrated_switch: true
      switch_type: "momentary_switch"
      supply_required: false
      pins:
        - "A"
        - "B"
        - "C"
        - "SW1"
        - "SW2"
    pcb:
      default_footprint: "RotaryEncoder_Alps_EC11E_Switch_Vertical"
      placement_side: "top"
      anchor: "shaft_center"
      tht: true
      estimated_height_above_pcb_mm: 14.0
      estimated_height_below_pcb_mm: 6.0
      notes:
        - "Footprint name is a project-local default and may need mapping to your KiCad library."
    ocf:
      control_type: "encoder"
      supports:
        - "rotate"
        - "press"
      default_logical_role: "push_encoder"
