components:
  - id: "adafruit_oled_096_i2c_ssd1306"
    category: "display"
    manufacturer: "Adafruit"
    part_number: "PID 326"
    description: "0.96 inch OLED status display for compact parameter readout, menus, and mode feedback"
    tags:
      - "display"
      - "oled"
      - "ssd1306"
      - "i2c"
      - "128x64"
      - "adafruit"
    ui:
      label: "OLED Status Display 0.96 in"
      icon: "display.svg"
      category: "Navigation & Feedback"
      tags:
        - "screen"
        - "status"
      command:
        placeable: true
        toolbar: true
        order: 40
        category: "Navigation & Feedback"
        label: "Place OLED Display"
        tooltip: "Place a compact OLED display for menus, mode feedback, or parameter readout. Click in the 3D view to position it."
        command_id: "OCW_PlaceDisplay"
    mechanical:
      breakout_size_mm:
        width: 29.2
        depth: 26.7
        thickness: 6.2
      screen_window_mm:
        width: 26.6
        height: 19.0
      mounting:
        method: "screw_mount"
        hole_spacing_mm:
          x: 24.0
          y: 24.0
        hole_diameter_mm: 2.5
      panel:
        recommended_window_mm:
          width: 27.0
          height: 14.0
        recommended_keepout_top_mm:
          width: 32.0
          height: 20.0
        recommended_keepout_bottom_mm:
          width: 29.2
          height: 26.7
          depth: 8.0
    electrical:
      type: "oled_display"
      controller: "SSD1306"
      interface: "i2c"
      resolution:
        width: 128
        height: 64
      address_options:
        - "0x3C"
        - "0x3D"
      logic_voltage_range: "3V-5V breakout dependent"
      pins:
        - "VIN"
        - "GND"
        - "SCL"
        - "SDA"
        - "RST"
    pcb:
      default_footprint: "Display:Adafruit_0.96in_128x64_OLED_I2C"
      placement_side: "top"
      anchor: "center"
      tht: false
      estimated_height_above_pcb_mm: 6.2
      estimated_height_below_pcb_mm: 2.0
      notes:
        - "Footprint name is a project-local default and may need mapping to your KiCad library."
        - "This entry targets the breakout board, not the bare OLED glass module."
    ocf:
      control_type: "display"
      supports:
        - "text"
        - "icons"
      default_logical_role: "status_display"

