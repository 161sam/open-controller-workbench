components:
  - id: "generic_rgb_arcade_button_24mm"
    category: "rgb_button"
    manufacturer: "Generic"
    part_number: "RGB-24MM"
    description: "24 mm illuminated trigger button with integrated RGB feedback for cues, modes, and performance actions"
    tags:
      - "button"
      - "rgb"
      - "arcade"
      - "24mm"
    ui:
      label: "RGB Trigger Button 24 mm"
      icon: "button.svg"
      category: "Performance Surface"
      tags:
        - "rgb"
        - "illuminated"
        - "performance"
      command:
        placeable: true
        toolbar: true
        order: 15
        category: "Performance Surface"
        label: "Place RGB Performance Button"
        tooltip: "Place an illuminated trigger button for cues, modes, or performance feedback. Click in the 3D view to position it."
        command_id: "OCW_PlaceRgbButton"
    mechanical:
      body_size_mm:
        width: 28.0
        depth: 28.0
        height: 30.0
      panel:
        recommended_hole_diameter_mm: 24.0
        recommended_hole_diameter_with_tolerance_mm: 24.2
        recommended_keepout_top_diameter_mm: 32.0
        recommended_keepout_bottom_diameter_mm: 30.0
        recommended_keepout_bottom_depth_mm: 32.0
      diffuser_light_area_diameter_mm: 18.0
      mounting:
        method: "threaded_bushing"
      orientation: "vertical"
    electrical:
      type: "switch_rgb_led"
      switch_type: "momentary_switch"
      led_type: "common_anode_rgb"
      pins:
        - "SW1"
        - "SW2"
        - "R"
        - "G"
        - "B"
    pcb:
      default_footprint: "Button_Switch_THT:RGB_Arcade_Button_24mm"
      placement_side: "top"
      anchor: "center"
      tht: true
      estimated_height_above_pcb_mm: 24.0
      estimated_height_below_pcb_mm: 8.0
    ocf:
      control_type: "button_rgb"
      supports:
        - "press"
        - "rgb_output"
      default_logical_role: "rgb_button"
