components:
  - id: "generic_mpc_pad_30mm"
    category: "pad"
    manufacturer: "Generic"
    part_number: "PAD-30SQ"
    description: "30 mm MPC-style square performance pad for finger drumming, clip launching, and scene triggers"
    tags:
      - "pad"
      - "mpc"
      - "performance"
      - "square"
    ui:
      label: "Finger Drum Pad 30 mm"
      icon: "pad.svg"
      category: "Performance Surface"
      tags:
        - "trigger"
        - "drum"
        - "finger-drumming"
      command:
        placeable: true
        toolbar: true
        order: 10
        category: "Performance Surface"
        label: "Place Performance Pad"
        tooltip: "Place a 30 mm finger drum pad for beat playing, clip launching, or scene triggers. Click in the 3D view to position it."
        command_id: "OCW_PlacePad"
    mechanical:
      body_size_mm:
        width: 32.0
        depth: 32.0
        height: 14.0
      panel:
        recommended_window_mm:
          width: 30.0
          height: 30.0
        recommended_keepout_top_mm:
          width: 38.0
          height: 38.0
        recommended_keepout_bottom_mm:
          width: 34.0
          height: 34.0
          depth: 18.0
      diffuser_light_area_mm:
        width: 24.0
        height: 24.0
      mounting:
        method: "pcb_only"
      orientation: "vertical"
    electrical:
      type: "momentary_switch"
      velocity_ready: true
      pins:
        - "1"
        - "2"
    pcb:
      default_footprint: "Button_Switch_THT:PAD_MPC_30mm"
      placement_side: "top"
      anchor: "center"
      tht: true
      estimated_height_above_pcb_mm: 12.0
      estimated_height_below_pcb_mm: 5.0
    ocf:
      control_type: "pad"
      role: "primary_control"
      placement_preference: "aligned_with_group"
      supports:
        - "press"
      default_logical_role: "performance_pad"
