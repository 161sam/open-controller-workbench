components:
  - id: "generic_45mm_linear_fader"
    category: "fader"
    manufacturer: "Generic"
    part_number: "SLIDE-45K"
    description: "45 mm compact channel fader for tight mixer lanes, monitor strips, or sidecar controls"
    tags:
      - "fader"
      - "linear"
      - "potentiometer"
      - "45mm"
    ui:
      label: "Compact Channel Fader 45 mm"
      icon: "fader.svg"
      category: "Mixing & Levels"
      tags:
        - "slider"
        - "level"
      command:
        placeable: false
    mechanical:
      body_size_mm:
        width: 56.0
        depth: 10.0
        height: 12.0
      slot_cutout:
        length_mm: 53.0
        width_mm: 2.2
      travel_mm: 45.0
      mounting_holes:
        spacing_mm: 60.0
        diameter_mm: 3.0
      panel:
        recommended_window_mm:
          width: 53.0
          height: 2.2
        recommended_keepout_top_mm:
          width: 72.0
          height: 18.0
        recommended_keepout_bottom_mm:
          width: 64.0
          height: 14.0
          depth: 16.0
      mounting:
        method: "screw_mount"
      orientation: "vertical"
    electrical:
      type: "potentiometer"
      taper: "linear"
      resistance_ohms: 10000
      pins:
        - "VCC"
        - "WIPER"
        - "GND"
    pcb:
      default_footprint: "Potentiometer_THT:SlidePot_45mm"
      placement_side: "top"
      anchor: "slot_center"
      tht: true
      estimated_height_above_pcb_mm: 15.0
      estimated_height_below_pcb_mm: 4.0
    ocf:
      control_type: "fader"
      role: "primary_control"
      placement_preference: "aligned_with_group"
      supports:
        - "analog_input"
      default_logical_role: "generic_fader"

  - id: "generic_60mm_linear_fader"
    category: "fader"
    manufacturer: "Generic"
    part_number: "SLIDE-60K"
    description: "60 mm long-throw channel fader for mixer lanes, stems, and expressive level control"
    tags:
      - "fader"
      - "linear"
      - "potentiometer"
      - "60mm"
    ui:
      label: "Long-Throw Channel Fader 60 mm"
      icon: "fader.svg"
      category: "Mixing & Levels"
      tags:
        - "slider"
        - "level"
      command:
        placeable: true
        toolbar: true
        order: 20
        category: "Mixing & Levels"
        label: "Place Channel Fader"
        tooltip: "Place a long-throw channel fader for volume, stem, or send control. Click in the 3D view to position it."
        command_id: "OCW_PlaceFader"
    mechanical:
      body_size_mm:
        width: 70.0
        depth: 10.0
        height: 12.0
      slot_cutout:
        length_mm: 68.0
        width_mm: 2.2
      travel_mm: 60.0
      mounting_holes:
        spacing_mm: 75.0
        diameter_mm: 3.0
      panel:
        recommended_window_mm:
          width: 68.0
          height: 2.2
        recommended_keepout_top_mm:
          width: 90.0
          height: 18.0
        recommended_keepout_bottom_mm:
          width: 80.0
          height: 14.0
          depth: 16.0
      mounting:
        method: "screw_mount"
      orientation: "vertical"
    electrical:
      type: "potentiometer"
      taper: "linear"
      resistance_ohms: 10000
      pins:
        - "VCC"
        - "WIPER"
        - "GND"
    pcb:
      default_footprint: "Potentiometer_THT:SlidePot_60mm"
      placement_side: "top"
      anchor: "slot_center"
      tht: true
      estimated_height_above_pcb_mm: 15.0
      estimated_height_below_pcb_mm: 4.0
    ocf:
      control_type: "fader"
      role: "primary_control"
      placement_preference: "aligned_with_group"
      supports:
        - "analog_input"
      default_logical_role: "generic_fader"
