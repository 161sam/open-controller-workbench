components:
  - id: "omron_b3f_1000"
    category: "button"
    manufacturer: "Omron"
    part_number: "B3F-1000"
    description: "6x6 mm tactile utility switch for transport, mode changes, mute, solo, and menu actions"
    tags:
      - "button"
      - "tactile"
      - "through-hole"
      - "6x6"
      - "omron"
    ui:
      label: "Tactile Utility Button 6 mm"
      icon: "button.svg"
      category: "Buttons & Utility"
      tags:
        - "press"
        - "trigger"
        - "menu"
      command:
        placeable: true
        toolbar: true
        order: 50
        category: "Buttons & Utility"
        label: "Place Utility Button"
        tooltip: "Place a tactile utility button for transport, mode switching, mute, solo, or menu actions. Click in the 3D view to position it."
        command_id: "OCW_PlaceButton"
    mechanical:
      body_size_mm:
        width: 6.0
        depth: 6.0
        height: 7.3
      panel:
        recommended_cap_opening_mm:
          width: 6.2
          height: 6.2
        recommended_keepout_top_mm:
          width: 14.0
          height: 14.0
        recommended_keepout_bottom_mm:
          width: 8.0
          height: 8.0
          depth: 10.0
      mounting:
        method: "pcb_only"
      orientation: "vertical"
    electrical:
      type: "momentary_switch"
      contact_form: "SPST-NO"
      bounce_time_max_ms: 5
      rated_voltage: "5V DC"
      rated_current: "1mA"
      durability_operations: 1000000
      pins:
        - "1"
        - "2"
        - "3"
        - "4"
    pcb:
      default_footprint: "Button_Switch_THT:SW_PUSH_6mm"
      placement_side: "top"
      anchor: "center"
      tht: true
      estimated_height_above_pcb_mm: 5.0
      estimated_height_below_pcb_mm: 3.5
      notes:
        - "Footprint name is a project-local default and may need mapping to your KiCad library."
    ocf:
      control_type: "button"
      supports:
        - "press"
      default_logical_role: "generic_button"
