template:
  id: "fader_strip"
  name: "Channel Strip"
  description: "Start a DAW or mixer channel strip with one main fader and the utility buttons users expect around it."
  category: "mixing"
  tags:
    - "fader"
    - "strip"
  version: "1.0"
metadata:
  workflow_hint: "Use this when a single channel lane should define the whole controller section."
  ideal_for:
    - "Mixer channel strips"
    - "Track control lanes"
    - "Compact utility strips"
  next_step: "Add an encoder above the fader or duplicate the strip idea into a wider multi-channel layout."
  smart_defaults:
    primary_group_role: "channel_strip_core"
    primary_zone_id: "fader_lane"
    edge_margin_mm: 10
    spacing_mm: 18
    default_placement_preference: "aligned_with_group"
  layout_zones:
    - id: "channel_core"
      label: "Channel Core"
      purpose: "Main fader lane and channel utility block."
      source_group_role: "channel_strip_core"
    - id: "top_label_area"
      label: "Top Label Area"
      purpose: "Display or label space above the fader."
      placement_preference: "centered_above_group"
    - id: "top_encoder"
      label: "Top Encoder"
      purpose: "Optional trim or send encoder above the strip."
      placement_preference: "centered_above_group"
  suggested_additions:
    - id: "channel_display"
      label: "Add Channel Display"
      short_label: "Channel Display"
      description: "Adds a compact OLED above the strip for channel names or value feedback."
      tooltip: "Add a compact display above the strip for channel name and level feedback."
      category: "Next Steps"
      group: "feedback"
      icon: "display.svg"
      priority: "primary"
      order: 10
      command_id: "OCW_AddChannelDisplay"
      status_message: "Channel display added above the strip."
      placement_preference: "centered_above_group"
      zone_id: "top_label_area"
      group_id: "channel_display"
      group_role: "feedback_header"
      components:
        - id: "display"
          library_ref: "adafruit_oled_096_i2c_ssd1306"
          type: "display"
          label: "Channel"
    - id: "top_encoder"
      label: "Add Navigation Encoder"
      short_label: "Top Encoder"
      description: "Adds one push encoder above the strip for trim, send, or page navigation."
      tooltip: "Add one encoder above the strip for trim, send, or page navigation."
      category: "Next Steps"
      group: "navigation"
      icon: "encoder.svg"
      priority: "secondary"
      order: 20
      command_id: "OCW_AddTopNavigationEncoder"
      status_message: "Navigation encoder added above the strip."
      placement_preference: "centered_above_group"
      zone_id: "top_encoder"
      group_id: "channel_encoder"
      group_role: "navigation_header"
      components:
        - id: "encoder"
          library_ref: "generic_ec11_encoder_with_push"
          type: "encoder"
          label: "Trim"
    - id: "utility_buttons"
      label: "Add Utility Buttons"
      short_label: "Utility Buttons"
      description: "Adds two more utility buttons below the strip for arm or monitor actions."
      tooltip: "Add extra utility buttons below the strip for record arm and monitor control."
      category: "Next Steps"
      group: "utility"
      icon: "button.svg"
      priority: "secondary"
      order: 30
      command_id: "OCW_AddChannelUtilityButtons"
      status_message: "Extra utility buttons added below the channel strip."
      placement_preference: "bottom_transport_row"
      zone_id: "button_row"
      group_id: "channel_extra_utility"
      group_role: "channel_utility_extension"
      spacing_mm: 20
      components:
        - id: "arm"
          library_ref: "omron_b3f_1000"
          type: "button"
          label: "Arm"
        - id: "monitor"
          library_ref: "omron_b3f_1000"
          type: "button"
          label: "Monitor"
controller:
  width: "${parameters.case_width}"
  depth: "${parameters.case_depth}"
  surface:
    type: "rounded_rect"
    width: "${parameters.case_width}"
    height: "${parameters.case_depth}"
    corner_radius: 8
  height: 30
  top_thickness: 3
  wall_thickness: 3
  bottom_thickness: 3
  lid_inset: 1.5
  inner_clearance: 0.35
zones:
  - id: "fader_lane"
    type: "column"
    x: 15
    y: 10
    width: 50
    height: 80
    strategy: "column"
  - id: "button_row"
    type: "row"
    x: 10
    y: 100
    width: 60
    height: 25
    strategy: "row"
components:
  - id: "fader1"
    type: "fader"
    library_ref: "generic_60mm_linear_fader"
    zone: "fader_lane"
    group_id: "channel_strip_core"
    group_role: "channel_strip_core"
  - id: "solo"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "button_row"
    group_id: "channel_strip_core"
    group_role: "channel_strip_core"
  - id: "mute"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "button_row"
    group_id: "channel_strip_core"
    group_role: "channel_strip_core"
  - id: "select"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "button_row"
    group_id: "channel_strip_core"
    group_role: "channel_strip_core"
layout:
  strategy: "zone"
  config:
    grid_mm: 2
    padding_mm: 12
    spacing_mm: 22
parameters:
  - id: "fader_length"
    label: "Fader Length"
    type: "enum"
    default: 60
    control: "button_group"
    options:
      - value: 45
        label: "45 mm"
      - value: 60
        label: "60 mm"
    help: "Select the travel and matching panel / PCB footprint for the channel strip."
  - id: "case_width"
    label: "Case Width"
    type: "float"
    default: 80.0
    min: 70.0
    max: 120.0
    step: 5.0
    unit: "mm"
    help: "Overall strip width including sidewall clearance."
  - id: "case_depth"
    label: "Case Depth"
    type: "float"
    default: 140.0
    min: 110.0
    max: 180.0
    step: 5.0
    unit: "mm"
    help: "Overall strip depth from fader lane to utility button row."
parameter_presets:
  - id: "long_fader"
    name: "Mixer Channel Strip"
    description: "Default long-throw strip with comfortable spacing for solo, mute, and select actions."
    values:
      fader_length: 60
      case_width: 80.0
      case_depth: 140.0
  - id: "compact_fader"
    name: "Compact Utility Strip"
    description: "Tighter strip for desktop utility controllers, monitor sections, or compact sidecars."
    values:
      fader_length: 45
      case_width: 78.0
      case_depth: 128.0
parameter_bindings:
  values:
    - target: "components[fader1].library_ref"
      parameter: "fader_length"
      value_map:
        "45": "generic_45mm_linear_fader"
        "60": "generic_60mm_linear_fader"
constraints:
  profile: "default"
defaults:
  io_strategy: "direct_gpio"
  component_defaults:
    by_zone:
      button_row:
        tags:
          - "utility"
          - "channel-actions"
      fader_lane:
        tags:
          - "mix"
          - "channel-level"
