template:
  id: "transport_module"
  name: "Transport Control Strip"
  description: "Start a DAW transport section with the core playback and recording buttons users reach for first."
  category: "transport"
  tags:
    - "transport"
    - "button"
  version: "1.0"
metadata:
  workflow_hint: "Use this when transport should be immediately visible and easy to hit."
  ideal_for:
    - "Recording transport"
    - "Playback control"
    - "Editing shuttle strips"
  next_step: "After the core transport row feels right, add a display or encoder next to it for jog and timeline work."
  smart_defaults:
    primary_group_role: "transport_core"
    primary_zone_id: "transport_buttons"
    edge_margin_mm: 10
    spacing_mm: 22
    default_placement_preference: "centered_above_group"
  layout_zones:
    - id: "transport_core"
      label: "Transport Core"
      purpose: "Main playback and recording row."
      source_group_role: "transport_core"
    - id: "display_header"
      label: "Display Header"
      purpose: "Feedback display above the transport row."
      placement_preference: "centered_above_group"
    - id: "right_navigation"
      label: "Right Navigation"
      purpose: "Jog or navigation encoder to the right of the transport row."
      placement_preference: "right_of_main"
  suggested_additions:
    - id: "display_header"
      label: "Add Display Header"
      short_label: "Display Header"
      description: "Adds a compact OLED above the transport row for timeline, mode, or record feedback."
      tooltip: "Add a compact OLED above the transport row for timeline and record feedback."
      category: "Next Steps"
      group: "feedback"
      icon: "display.svg"
      priority: "primary"
      order: 10
      command_id: "OCW_AddDisplayHeader"
      status_message: "Display header added above the transport row."
      placement_preference: "centered_above_group"
      zone_id: "display_header"
      group_id: "transport_display"
      group_role: "feedback_header"
      components:
        - id: "display"
          library_ref: "adafruit_oled_096_i2c_ssd1306"
          type: "display"
          label: "Transport"
    - id: "jog_encoder"
      label: "Add Navigation Encoder"
      short_label: "Jog Encoder"
      description: "Adds a push encoder to the right for jog, scrub, or locator work."
      tooltip: "Add a right-side encoder for jog, scrub, or locator work."
      category: "Next Steps"
      group: "navigation"
      icon: "encoder.svg"
      priority: "secondary"
      order: 20
      command_id: "OCW_AddJogEncoder"
      status_message: "Jog encoder added on the right side."
      placement_preference: "right_of_main"
      zone_id: "right_navigation"
      group_id: "transport_navigation"
      group_role: "navigation_strip"
      components:
        - id: "jog"
          library_ref: "generic_ec11_encoder_with_push"
          type: "encoder"
          label: "Jog"
    - id: "utility_buttons"
      label: "Add Utility Buttons"
      short_label: "Utility Buttons"
      description: "Adds two utility buttons for locator or click functions near the transport row."
      tooltip: "Add utility buttons for marker and click functions near the transport controls."
      category: "Next Steps"
      group: "utility"
      icon: "button.svg"
      priority: "secondary"
      order: 30
      command_id: "OCW_AddTransportUtilityButtons"
      status_message: "Utility buttons added beside the transport row."
      placement_preference: "bottom_transport_row"
      group_id: "transport_utility_buttons"
      group_role: "utility_strip"
      spacing_mm: 20
      components:
        - id: "marker"
          library_ref: "omron_b3f_1000"
          type: "button"
          label: "Marker"
        - id: "click"
          library_ref: "omron_b3f_1000"
          type: "button"
          label: "Click"
controller:
  width: "${parameters.case_width}"
  depth: "${parameters.case_depth}"
  surface:
    type: "rounded_rect"
    width: "${parameters.case_width}"
    height: "${parameters.case_depth}"
    corner_radius: 8
  height: 28
  top_thickness: 3
  wall_thickness: 3
  bottom_thickness: 3
  lid_inset: 1.5
  inner_clearance: 0.35
zones:
  - id: "transport_buttons"
    type: "row"
    x: 10
    y: 10
    width: 130
    height: 30
    strategy: "row"
components:
  - id: "play"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "transport_buttons"
    group_id: "transport_core"
    group_role: "transport_core"
  - id: "stop"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "transport_buttons"
    group_id: "transport_core"
    group_role: "transport_core"
  - id: "rec"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "transport_buttons"
    group_id: "transport_core"
    group_role: "transport_core"
  - id: "loop"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "transport_buttons"
    group_id: "transport_core"
    group_role: "transport_core"
  - id: "rew"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "transport_buttons"
    group_id: "transport_core"
    group_role: "transport_core"
  - id: "ff"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "transport_buttons"
    group_id: "transport_core"
    group_role: "transport_core"
layout:
  strategy: "row"
  config:
    grid_mm: 2
    padding_mm: 12
    spacing_mm: "${parameters.button_spacing}"
parameters:
  - id: "case_width"
    label: "Case Width"
    type: "float"
    default: 150.0
    min: 130.0
    max: 220.0
    step: 5.0
    unit: "mm"
    help: "Overall width of the transport section."
  - id: "case_depth"
    label: "Case Depth"
    type: "float"
    default: 50.0
    min: 46.0
    max: 70.0
    step: 2.0
    unit: "mm"
    help: "Overall depth of the transport strip."
  - id: "button_spacing"
    label: "Button Spacing"
    type: "float"
    default: 22.0
    min: 18.0
    max: 28.0
    step: 1.0
    unit: "mm"
    help: "Center-to-center spacing between the transport buttons."
parameter_presets:
  - id: "recording_transport"
    name: "Recording Transport"
    description: "Comfortable button spacing for frequent play, stop, and record work."
    values:
      case_width: 150.0
      case_depth: 50.0
      button_spacing: 22.0
  - id: "editing_shuttle_strip"
    name: "Editing Shuttle Strip"
    description: "A slightly wider strip with more breathing room for rewind and fast-forward use."
    values:
      case_width: 178.0
      case_depth: 54.0
      button_spacing: 25.0
constraints:
  profile: "default"
defaults:
  io_strategy: "direct_gpio"
  component_defaults:
    by_zone:
      transport_buttons:
        tags:
          - "transport"
          - "daw-control"
