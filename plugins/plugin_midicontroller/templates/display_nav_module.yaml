template:
  id: "display_nav_module"
  name: "Display And Navigation Module"
  description: "Start a menu-driven controller section with a status display, two browsing encoders, and dedicated back / enter buttons."
  category: "navigation"
  tags:
    - "display"
    - "navigation"
  version: "1.0"
metadata:
  workflow_hint: "Use this when display feedback and browsing are central to the user flow."
  ideal_for:
    - "Menu navigation"
    - "Preset browsing"
    - "Utility controller sections"
  next_step: "Tune the display size first, then refine encoder spacing and finally add transport or macro controls around the module."
  smart_defaults:
    primary_group_role: "display_navigation_core"
    primary_zone_id: "nav_zone"
    edge_margin_mm: 10
    spacing_mm: 18
    default_placement_preference: "bottom_transport_row"
  layout_zones:
    - id: "display_navigation_core"
      label: "Display Navigation Core"
      purpose: "Display plus browse controls as one functional unit."
      source_group_role: "display_navigation_core"
    - id: "bottom_transport"
      label: "Bottom Transport"
      purpose: "Small transport or utility row below the navigation controls."
      placement_preference: "bottom_transport_row"
  suggested_additions:
    - id: "transport_buttons"
      label: "Add Transport Buttons"
      description: "Adds a small transport row below the navigation section."
      placement_preference: "bottom_transport_row"
      zone_id: "bottom_transport"
      group_id: "display_nav_transport"
      group_role: "transport_strip"
      spacing_mm: 22
      components:
        - id: "play"
          library_ref: "omron_b3f_1000"
          type: "button"
          label: "Play"
        - id: "stop"
          library_ref: "omron_b3f_1000"
          type: "button"
          label: "Stop"
        - id: "rec"
          library_ref: "omron_b3f_1000"
          type: "button"
          label: "Rec"
controller:
  width: "${parameters.case_width}"
  depth: "${parameters.case_depth}"
  surface:
    type: "rounded_rect"
    width: "${parameters.case_width}"
    height: "${parameters.case_depth}"
    corner_radius: 8
  height: 30
  top_thickness: 3
  wall_thickness: 3
  bottom_thickness: 3
  lid_inset: 1.5
  inner_clearance: 0.35
zones:
  - id: "display_zone"
    type: "grid"
    x: 45
    y: 10
    width: 70
    height: 30
    strategy: "grid"
  - id: "nav_zone"
    type: "grid"
    x: 15
    y: 45
    width: 130
    height: 30
    strategy: "grid"
components:
  - id: "oled_status"
    type: "display"
    library_ref: "adafruit_oled_096_i2c_ssd1306"
    zone: "display_zone"
    group_id: "display_navigation_core"
    group_role: "display_navigation_core"
  - id: "enc_left"
    type: "encoder"
    library_ref: "generic_ec11_encoder_with_push"
    zone: "nav_zone"
    group_id: "display_navigation_core"
    group_role: "display_navigation_core"
  - id: "enc_right"
    type: "encoder"
    library_ref: "generic_ec11_encoder_with_push"
    zone: "nav_zone"
    group_id: "display_navigation_core"
    group_role: "display_navigation_core"
  - id: "btn_back"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "nav_zone"
    group_id: "display_navigation_core"
    group_role: "display_navigation_core"
  - id: "btn_enter"
    type: "button"
    library_ref: "omron_b3f_1000"
    zone: "nav_zone"
    group_id: "display_navigation_core"
    group_role: "display_navigation_core"
layout:
  strategy: "zone"
  config:
    grid_mm: 1
    padding_mm: 10
    spacing_x_mm: "${parameters.nav_spacing}"
    spacing_y_mm: 24
parameters:
  - id: "case_width"
    label: "Case Width"
    type: "float"
    default: 160.0
    min: 140.0
    max: 220.0
    step: 5.0
    unit: "mm"
    help: "Overall width of the navigation section."
  - id: "case_depth"
    label: "Case Depth"
    type: "float"
    default: 90.0
    min: 80.0
    max: 120.0
    step: 5.0
    unit: "mm"
    help: "Overall depth of the navigation section."
  - id: "nav_spacing"
    label: "Navigation Spacing"
    type: "float"
    default: 32.0
    min: 24.0
    max: 42.0
    step: 1.0
    unit: "mm"
    help: "Horizontal spacing between the navigation controls."
  - id: "display_size_inch"
    label: "Display Size"
    type: "enum"
    default: "0.96"
    control: "select"
    options:
      - value: "0.96"
        label: "0.96 inch"
      - value: "1.3"
        label: "1.3 inch"
    help: "Select the display breakout size used for the status screen."
  - id: "knob_diameter"
    label: "Knob Diameter"
    type: "enum"
    default: 18
    control: "button_group"
    options:
      - value: 18
        label: "18 mm"
      - value: 24
        label: "24 mm"
    unit: "mm"
    help: "Select the encoder knob clearance profile."
parameter_presets:
  - id: "compact_encoder_strip"
    name: "Compact Screen Utility"
    description: "Small status section for compact desktop devices or side-panel utilities."
    values:
      case_width: 150.0
      case_depth: 88.0
      nav_spacing: 28.0
      display_size_inch: "0.96"
      knob_diameter: 18
  - id: "wide_large_display"
    name: "Preset Browser Section"
    description: "More visual emphasis and wider encoder spacing for browser-heavy controllers."
    values:
      case_width: 190.0
      case_depth: 96.0
      nav_spacing: 36.0
      display_size_inch: "1.3"
      knob_diameter: 24
parameter_bindings:
  values:
    - target: "components[oled_status].library_ref"
      parameter: "display_size_inch"
      value_map:
        "0.96": "adafruit_oled_096_i2c_ssd1306"
        "1.3": "adafruit_oled_130_i2c_ssd1306"
    - target: "components[enc_left].library_ref"
      parameter: "knob_diameter"
      value_map:
        "18": "generic_ec11_encoder_with_push"
        "24": "generic_ec11_encoder_with_push_large_knob"
    - target: "components[enc_right].library_ref"
      parameter: "knob_diameter"
      value_map:
        "18": "generic_ec11_encoder_with_push"
        "24": "generic_ec11_encoder_with_push_large_knob"
constraints:
  profile: "default"
defaults:
  io_strategy: "direct_gpio"
  component_defaults:
    by_zone:
      display_zone:
        tags:
          - "status"
          - "template"
      nav_zone:
        tags:
          - "navigation"
          - "template"
