template:
  id: "encoder_module"
  name: "Macro Encoder Bank"
  description: "Start a macro, synth, or effects control surface with four encoders laid out for quick hands-on tweaking."
  category: "macro_controls"
  tags:
    - "encoder"
    - "controls"
  version: "1.0"
metadata:
  workflow_hint: "Use this when rotary control is the main job of the device."
  ideal_for:
    - "Synth macro controls"
    - "Effects sends"
    - "Parameter pages"
  next_step: "Add a display above the encoders or utility buttons below them once the knob spacing feels right."
  smart_defaults:
    primary_group_role: "macro_encoder_bank"
    primary_zone_id: "main_controls"
    edge_margin_mm: 10
    spacing_mm: 20
    default_placement_preference: "centered_above_group"
  layout_zones:
    - id: "encoder_bank"
      label: "Encoder Bank"
      purpose: "Primary row of macro encoders."
      source_group_role: "macro_encoder_bank"
    - id: "display_header"
      label: "Display Header"
      purpose: "Display band above the encoder bank."
      placement_preference: "centered_above_group"
    - id: "utility_row"
      label: "Utility Row"
      purpose: "Compact buttons below or beside the encoders."
      placement_preference: "bottom_transport_row"
  suggested_additions:
    - id: "display_header"
      label: "Add Display Header"
      description: "Adds a centered OLED above the encoder bank for parameter names or values."
      placement_preference: "centered_above_group"
      zone_id: "display_header"
      group_id: "encoder_display_header"
      group_role: "feedback_header"
      components:
        - id: "display"
          library_ref: "adafruit_oled_096_i2c_ssd1306"
          type: "display"
          label: "Value"
    - id: "utility_buttons"
      label: "Add Utility Buttons"
      description: "Adds two compact buttons for shift or macro-page switching."
      placement_preference: "bottom_transport_row"
      zone_id: "utility_row"
      group_id: "encoder_utility_row"
      group_role: "utility_strip"
      spacing_mm: 24
      components:
        - id: "page"
          library_ref: "omron_b3f_1000"
          type: "button"
          label: "Page"
        - id: "shift"
          library_ref: "omron_b3f_1000"
          type: "button"
          label: "Shift"
controller:
  width: "${parameters.case_width}"
  depth: "${parameters.case_depth}"
  surface:
    type: "rounded_rect"
    width: "${parameters.case_width}"
    height: "${parameters.case_depth}"
    corner_radius: 8
  height: 30
  top_thickness: 3
  wall_thickness: 3
  bottom_thickness: 3
  lid_inset: 1.5
  inner_clearance: 0.35
zones:
  - id: "main_controls"
    type: "grid"
    x: 10
    y: 10
    width: 100
    height: 40
    strategy: "grid"
components:
  - id: "enc1"
    type: "encoder"
    library_ref: "generic_ec11_encoder_with_push"
    zone: "main_controls"
    group_id: "macro_encoder_bank"
    group_role: "macro_encoder_bank"
  - id: "enc2"
    type: "encoder"
    library_ref: "generic_ec11_encoder_with_push"
    zone: "main_controls"
    group_id: "macro_encoder_bank"
    group_role: "macro_encoder_bank"
  - id: "enc3"
    type: "encoder"
    library_ref: "generic_ec11_encoder_with_push"
    zone: "main_controls"
    group_id: "macro_encoder_bank"
    group_role: "macro_encoder_bank"
  - id: "enc4"
    type: "encoder"
    library_ref: "generic_ec11_encoder_with_push"
    zone: "main_controls"
    group_id: "macro_encoder_bank"
    group_role: "macro_encoder_bank"
layout:
  strategy: "grid"
  config:
    grid_mm: 1
    padding_mm: 10
    rows: 1
    cols: 4
    spacing_x_mm: "${parameters.encoder_spacing}"
    spacing_y_mm: 20
parameters:
  - id: "case_width"
    label: "Case Width"
    type: "float"
    default: 120.0
    min: 104.0
    max: 180.0
    step: 4.0
    unit: "mm"
    help: "Overall width of the encoder bank."
  - id: "case_depth"
    label: "Case Depth"
    type: "float"
    default: 60.0
    min: 56.0
    max: 90.0
    step: 2.0
    unit: "mm"
    help: "Overall depth of the encoder bank."
  - id: "encoder_spacing"
    label: "Encoder Spacing"
    type: "float"
    default: 25.0
    min: 20.0
    max: 36.0
    step: 1.0
    unit: "mm"
    help: "Center-to-center spacing between the encoders."
parameter_presets:
  - id: "desktop_macro_bank"
    name: "Desktop Macro Bank"
    description: "Balanced four-encoder section for desktop parameter control."
    values:
      case_width: 120.0
      case_depth: 60.0
      encoder_spacing: 25.0
  - id: "spacious_performance_macro_bank"
    name: "Spacious Performance Macro Bank"
    description: "More room around each knob for aggressive live tweaking and larger caps."
    values:
      case_width: 156.0
      case_depth: 68.0
      encoder_spacing: 34.0
constraints:
  profile: "default"
defaults:
  io_strategy: "direct_gpio"
  component_defaults:
    by_type:
      encoder:
        tags:
          - "encoder-bank"
          - "macro"
