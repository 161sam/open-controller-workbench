template:
  id: "pad_grid_4x4"
  name: "Finger Drum Pad Grid"
  description: "Start a beat-making or clip-launch controller with a clear 16-pad surface and enough room for later transport or display additions."
  category: "performance"
  tags:
    - "pad"
    - "grid"
    - "performance"
  version: "1.0"
metadata:
  workflow_hint: "Use this when the pads are the main reason the controller exists."
  ideal_for:
    - "Finger drumming"
    - "Clip launching"
    - "Scene triggering"
  next_step: "Add transport buttons or a status display around the pad matrix once the pad spacing feels right."
controller:
  width: "${parameters.case_width}"
  depth: "${parameters.case_depth}"
  surface:
    type: "rounded_rect"
    width: "${parameters.case_width}"
    height: "${parameters.case_depth}"
    corner_radius: 10
  height: 32
  top_thickness: 3
  wall_thickness: 3
  bottom_thickness: 3
  lid_inset: 1.5
  inner_clearance: 0.35
zones:
  - id: "pad_matrix"
    type: "grid"
    x: 15
    y: 15
    width: 150
    height: 150
    strategy: "grid"
components: []
layout:
  strategy: "grid"
  config:
    grid_mm: 2
    padding_mm: 14
    rows: "${parameters.pad_count_y}"
    cols: "${parameters.pad_count_x}"
    spacing_x_mm: 34
    spacing_y_mm: 34
parameters:
  - id: "pad_count_x"
    label: "Pad Count X"
    type: "int"
    default: 4
    min: 2
    max: 8
    step: 1
    control: "slider"
    help: "Number of pad columns in the generated matrix."
  - id: "pad_count_y"
    label: "Pad Count Y"
    type: "int"
    default: 4
    min: 2
    max: 8
    step: 1
    control: "slider"
    help: "Number of pad rows in the generated matrix."
  - id: "case_width"
    label: "Case Width"
    type: "float"
    default: 180.0
    min: 120.0
    max: 320.0
    step: 5.0
    unit: "mm"
    help: "Overall controller width."
  - id: "case_depth"
    label: "Case Depth"
    type: "float"
    default: 180.0
    min: 100.0
    max: 260.0
    step: 5.0
    unit: "mm"
    help: "Overall controller depth."
parameter_presets:
  - id: "pad_grid_4x4"
    name: "Studio Finger Drum 4x4"
    description: "Balanced 16-pad starter for drum racks, clip launching, and general performance work."
    values:
      pad_count_x: 4
      pad_count_y: 4
      case_width: 180.0
      case_depth: 180.0
  - id: "pad_grid_8x2"
    name: "Clip Launch Bar 8x2"
    description: "Wide shallow pad strip for clip rows, scene triggers, or performance shortcuts."
    values:
      pad_count_x: 8
      pad_count_y: 2
      case_width: 300.0
      case_depth: 110.0
  - id: "pad_grid_4x4_hybrid"
    name: "Hybrid Pad Grid 4x4"
    description: "Keeps the 4x4 pad core but leaves more side space for encoders, transport, or a small display."
    values:
      pad_count_x: 4
      pad_count_y: 4
      case_width: 220.0
      case_depth: 190.0
parameter_bindings:
  component_grids:
    - id_prefix: "pad"
      group_id: "pad_matrix"
      group_role: "performance_pad_matrix"
      label_pattern: "Pad {row},{col}"
      count_x_parameter: "pad_count_x"
      count_y_parameter: "pad_count_y"
      component:
        type: "pad"
        library_ref: "generic_mpc_pad_30mm"
        zone: "pad_matrix"
constraints:
  profile: "default"
defaults:
  io_strategy: "matrix"
  component_defaults:
    by_type:
      pad:
        tags:
          - "performance"
          - "grid"
          - "finger-drumming"
