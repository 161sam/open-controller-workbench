template:
  id: "pad_grid_4x4"
  name: "Finger Drum Pad Grid"
  description: "Start a beat-making or clip-launch controller with a clear 16-pad surface and enough room for later transport or display additions."
  category: "performance"
  tags:
    - "pad"
    - "grid"
    - "performance"
  version: "1.0"
metadata:
  workflow_hint: "Use this when the pads are the main reason the controller exists."
  ideal_for:
    - "Finger drumming"
    - "Clip launching"
    - "Scene triggering"
  next_step: "Add transport buttons or a status display around the pad matrix once the pad spacing feels right."
  smart_defaults:
    primary_group_role: "performance_pad_matrix"
    primary_zone_id: "pad_matrix"
    edge_margin_mm: 12
    spacing_mm: 18
    default_placement_preference: "right_of_main"
  layout_zones:
    - id: "main_pad_surface"
      label: "Main Pad Surface"
      purpose: "Primary performance pad matrix."
      source_group_role: "performance_pad_matrix"
    - id: "right_utility_strip"
      label: "Right Utility Strip"
      purpose: "Mode, shift, or scene buttons beside the pad area."
      placement_preference: "right_of_main"
    - id: "top_navigation_row"
      label: "Top Navigation Row"
      purpose: "Encoders or utility controls above the pad matrix."
      placement_preference: "top_row"
    - id: "display_header"
      label: "Display Header"
      purpose: "Status display centered above the pad area."
      placement_preference: "centered_above_group"
  suggested_additions:
    - id: "utility_strip_right"
      label: "Add Utility Strip"
      short_label: "Utility Strip"
      description: "Adds a simple right-side strip with shift, scene, and mode buttons."
      tooltip: "Add a right-side utility strip for shift, scene, and mode actions."
      category: "Next Steps"
      group: "utility"
      icon: "button.svg"
      priority: "primary"
      order: 10
      command_id: "OCW_AddUtilityStrip"
      status_message: "Utility strip added on the right side."
      placement_preference: "right_of_main"
      zone_id: "right_utility_strip"
      group_id: "pad_utility_strip"
      group_role: "utility_strip"
      components:
        - id: "shift"
          library_ref: "omron_b3f_1000"
          type: "button"
          label: "Shift"
        - id: "scene"
          library_ref: "omron_b3f_1000"
          type: "button"
          label: "Scene"
        - id: "mode"
          library_ref: "omron_b3f_1000"
          type: "button"
          label: "Mode"
    - id: "navigation_encoder_pair"
      label: "Add Navigation Encoder Pair"
      short_label: "Navigation Pair"
      description: "Adds two push encoders above the pad grid for browsing or page switching."
      tooltip: "Add two navigation encoders above the pad grid for browsing and page changes."
      category: "Next Steps"
      group: "navigation"
      icon: "encoder.svg"
      priority: "secondary"
      order: 20
      command_id: "OCW_AddNavigationEncoderPair"
      status_message: "Navigation encoders added above the pad grid."
      placement_preference: "top_row"
      zone_id: "top_navigation_row"
      group_id: "pad_navigation_top"
      group_role: "navigation_strip"
      spacing_mm: 28
      components:
        - id: "nav_left"
          library_ref: "generic_ec11_encoder_with_push"
          type: "encoder"
          label: "Browse"
        - id: "nav_right"
          library_ref: "generic_ec11_encoder_with_push"
          type: "encoder"
          label: "Page"
    - id: "display_header"
      label: "Add Display Header"
      short_label: "Display Header"
      description: "Adds a compact OLED centered above the pad grid for mode and clip feedback."
      tooltip: "Add a centered OLED above the pad grid for clip, mode, and status feedback."
      category: "Next Steps"
      group: "feedback"
      icon: "display.svg"
      priority: "secondary"
      order: 30
      command_id: "OCW_AddDisplayHeader"
      status_message: "Display header added above the pad grid."
      placement_preference: "centered_above_group"
      zone_id: "display_header"
      group_id: "pad_display_header"
      group_role: "feedback_header"
      components:
        - id: "display"
          library_ref: "adafruit_oled_096_i2c_ssd1306"
          type: "display"
          label: "Status"
controller:
  width: "${parameters.case_width}"
  depth: "${parameters.case_depth}"
  surface:
    type: "rounded_rect"
    width: "${parameters.case_width}"
    height: "${parameters.case_depth}"
    corner_radius: 10
  height: 32
  top_thickness: 3
  wall_thickness: 3
  bottom_thickness: 3
  lid_inset: 1.5
  inner_clearance: 0.35
zones:
  - id: "pad_matrix"
    type: "grid"
    x: 15
    y: 15
    width: 150
    height: 150
    strategy: "grid"
components: []
layout:
  strategy: "grid"
  config:
    grid_mm: 2
    padding_mm: 10
    rows: "${parameters.pad_count_y}"
    cols: "${parameters.pad_count_x}"
    spacing_x_mm: 36
    spacing_y_mm: 36
parameters:
  - id: "pad_count_x"
    label: "Pad Count X"
    type: "int"
    default: 4
    min: 2
    max: 8
    step: 1
    control: "slider"
    help: "Number of pad columns in the generated matrix."
  - id: "pad_count_y"
    label: "Pad Count Y"
    type: "int"
    default: 4
    min: 2
    max: 8
    step: 1
    control: "slider"
    help: "Number of pad rows in the generated matrix."
  - id: "case_width"
    label: "Case Width"
    type: "float"
    default: 180.0
    min: 120.0
    max: 320.0
    step: 5.0
    unit: "mm"
    help: "Overall controller width."
  - id: "case_depth"
    label: "Case Depth"
    type: "float"
    default: 180.0
    min: 100.0
    max: 260.0
    step: 5.0
    unit: "mm"
    help: "Overall controller depth."
parameter_presets:
  - id: "pad_grid_4x4"
    name: "Studio Finger Drum 4x4"
    description: "Balanced 16-pad starter for drum racks, clip launching, and general performance work."
    values:
      pad_count_x: 4
      pad_count_y: 4
      case_width: 180.0
      case_depth: 180.0
  - id: "pad_grid_8x2"
    name: "Clip Launch Bar 8x2"
    description: "Wide shallow pad strip for clip rows, scene triggers, or performance shortcuts."
    values:
      pad_count_x: 8
      pad_count_y: 2
      case_width: 300.0
      case_depth: 110.0
  - id: "pad_grid_4x4_hybrid"
    name: "Hybrid Pad Grid 4x4"
    description: "Keeps the 4x4 pad core but leaves more side space for encoders, transport, or a small display."
    values:
      pad_count_x: 4
      pad_count_y: 4
      case_width: 220.0
      case_depth: 190.0
parameter_bindings:
  component_grids:
    - id_prefix: "pad"
      group_id: "pad_matrix"
      group_role: "performance_pad_matrix"
      label_pattern: "Pad {row},{col}"
      count_x_parameter: "pad_count_x"
      count_y_parameter: "pad_count_y"
      component:
        type: "pad"
        library_ref: "generic_mpc_pad_30mm"
        zone: "pad_matrix"
constraints:
  profile: "default"
defaults:
  io_strategy: "matrix"
  component_defaults:
    by_type:
      pad:
        tags:
          - "performance"
          - "grid"
          - "finger-drumming"
