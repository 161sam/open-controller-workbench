variant:
  id: "pad_grid_4x4_oled"
  name: "4x4 Pad Grid with OLED"
  description: "Performance pad grid with added OLED status display"
  template_id: "pad_grid_4x4"
  category: "module"
  tags:
    - "pad"
    - "grid"
    - "oled"
  version: "1.0"

overrides:
  controller:
    surface:
      width: 220
  zones:
    - id: "pad_matrix"
      type: "grid"
      x: 15
      y: 15
      width: 150
      height: 150
      strategy: "grid"
    - id: "display_zone"
      type: "grid"
      x: 176
      y: 20
      width: 29
      height: 25
      strategy: "grid"
  components:
    add:
      - id: "oled_status"
        type: "display"
        library_ref: "adafruit_oled_096_i2c_ssd1306"
        zone: "display_zone"
  layout:
    strategy: "zone"
    config:
      rows: 4
      cols: 4
      spacing_x_mm: 36
      spacing_y_mm: 36
  defaults:
    io_strategy: "matrix"
